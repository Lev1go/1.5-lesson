<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <main class="theme">
        <div class="container">
        <div class="theme-section">
            <h1 class="title">Налаштування аккаунту</h1>
            <h3 class="sub-title-1">ТЕМА ІНТЕРФЕЙСУ</h3>

            <div class="theme-buttons">
                <label class="theme-option light-l">
                    <input type="radio" name="theme" checked class="radio" id="light">
                    <span class="light">Світла</span>
                </label>

                <label class="theme-option dark-l">
                    <input type="radio" name="theme" class="radio" id="dark">
                    <span class="dark">Темна</span>
                </label>
            </div>
        </div>
        <section class="emeil">
            <h2>EMEIL СПОВІЩЕННЯ</h2>
            <div class="check_conteiner">
                <h3 class="check_title">нові повідомлення в чаті</h3>
                <input type="checkbox" name="" id="" class="emeil_check1">
            </div>
            <div class="check_conteiner">
                <h3 class="check_title">щотижневий звіт успішності</h3>
                <input type="checkbox" name="" id="" class="emeil_check2">
            </div>
        </section>
        </div>
    </main>
</body>

</html>
